<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First To-Do App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
</head>
</head>
<body>

    <div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1 class="title">My To-do list</h1>
      <span class="task-count" id="task-count">0 tasks</span>
    </div>
    <p class="subtitle">Your tasks, beautifully managed.</p>
  </div>

  <!-- Input -->
  <div class="input-row">
    <input type="text" id="task-input" placeholder="Add a new task…" autocomplete="off" />
    <button class="add-btn" id="add-btn">Add task</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <!-- Task List -->
  <ul id="task-list" role="list"></ul>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" role="status" aria-live="polite">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <path d="M3 10h18M8 3v4M16 3v4"/>
      </svg>
    </div>
    <h3>No tasks yet!</h3>
    <p>Add something above to get started.</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-info" id="footer-info"></span>
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>

</div>

    <script src="script.js"></script>
</body>
</html>
